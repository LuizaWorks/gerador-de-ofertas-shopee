<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopeeZap VIP</title>
    <meta name="theme-color" content="#ee4d2d">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .app-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #ee4d2d; text-align: center; }
        h2 { color: #ee4d2d; margin-bottom: 20px; font-size: 26px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa; }
        .btn-gerar { width: 100%; padding: 18px; background: linear-gradient(135deg, #ee4d2d, #ff7337); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #btnZap { display: none; width: 100%; padding: 18px; background-color: #25d366; color: white; border: none; border-radius: 15px; font-weight: bold; text-decoration: none; text-align: center; margin-top: 20px; box-sizing: border-box; font-size: 18px; }
    </style>
</head>
<body>
<div class="app-card">
    <h2>🧡 ShopeeZap VIP</h2>
    <div class="input-group"><label>Link do Produto</label><input type="text" id="link" placeholder="Cole o link..."></div>
    <div class="input-group"><label>Nome do Produto</label><input type="text" id="nome" placeholder="Ex: Ventilador"></div>
    <div class="input-group"><label>Preço Opcional</label><input type="text" id="preco" placeholder="Ex: 149,90"></div>
    <button class="btn-gerar" onclick="gerarPost()">CRIAR OFERTA 🎲</button>
    <a id="btnZap" href="#" target="_blank">📲 ENVIAR NO WHATSAPP</a>
</div>
<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    function gerarPost() {
        const link = document.getElementById('link').value.trim();
        const nomeRaw = document.getElementById('nome').value.trim();
        const preco = document.getElementById('preco').value.trim();
        const grupo = "https://chat.whatsapp.com/FneGhsY2xwH5rzhqi32hFq";
        if (!link || !nomeRaw) { alert("Preencha o link e o nome!"); return; }
        const p = preco ? `\n💰 *VALOR: R$ ${preco}*` : "\n✅ *MELHOR PREÇO DO DIA!*";
        const n = "*" + nomeRaw.toUpperCase() + "*";
        const c = "\n\n--- \n🚀 *Envie nosso grupo para seus amigos:* \n" + grupo;
        const modelos = [
            `⚠️ *ALERTA!* ⚠️\n\n📦 ${n}${p}\n\n📢 *ESTOQUE BAIXANDO!* \n🛒 *COMPRE AQUI:* \n${link}${c}`,
            `🔥 *OFERTA!* 🔥\n\n🛍️ ${n}${p}\n\n✅ Preço imbatível hoje!\n🛒 *LINK:* \n${link}${c}`,
            `✨ *UTILIDADE!* ✨\n\n📦 ${n}${p}\n\n🚚 Frete Grátis disponível!\n🛒 *PEQUE O SEU:* \n${link}${c}`,
            `🛑 *PAROU TUDO!* 🛑\n\n📦 ${n}${p}\n\n😱 Menor preço do mês!\n🛒 *COMPRE AGORA:* \n${link}${c}`
            // ... (as outras 16 frases seguem a mesma lógica)
        ];
        const sorteio = modelos[Math.floor(Math.random() * modelos.length)];
        document.getElementById('btnZap').href = "https://api.whatsapp.com/send?text=" + encodeURIComponent(sorteio);
        document.getElementById('btnZap').style.display = 'block';
    }
</script>
</body>
</html>
