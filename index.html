<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopeeZap AI Pro</title>
    <meta name="theme-color" content="#ee4d2d">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .stats-bar { display: flex; justify-content: space-around; background: #333; color: white; width: 100%; max-width: 400px; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .app-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid #ee4d2d; margin-bottom: 20px; }
        .ai-status { background: #fff5f2; color: #ee4d2d; padding: 10px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; border: 1px solid #ffdbd1; text-align: center; font-weight: bold; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa; }
        .btn-gerar { width: 100%; padding: 18px; background: linear-gradient(135deg, #ee4d2d, #ff7337); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
        .history-card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .history-item { font-size: 13px; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { color: #ff4444; border: none; background: none; cursor: pointer; font-size: 18px; }
        .btn-reuse { background: #f0f2f5; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="stats-bar">
    <span id="horaStatus">🕒 Turno: --</span>
    <span id="contagemDia">📊 0 de 20 Ofertas</span>
</div>

<div class="app-card">
    <div id="aiSuggestion" class="ai-status">🤖 Gerador de Ofertas</div>
    <div class="input-group"><label>Link do Produto</label><input type="text" id="link" placeholder="Cole o link..."></div>
    <div class="input-group"><label>Nome do Produto</label><input type="text" id="nome" placeholder="Digite o nome..."></div>
    <div class="input-group"><label>Preço (R$)</label><input type="text" id="preco" placeholder="Ex: 149,90"></div>
    <button class="btn-gerar" onclick="gerarEEnviar()">GERAR OFERTA 🔥</button>
</div>

<div class="history-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3>🕒 Histórico</h3>
        <button onclick="limparTudo()" style="border:none; background:none; color:red; font-size:11px; cursor:pointer;">Limpar</button>
    </div>
    <div id="historyList"></div>
</div>

<script>
    const grupoLink = "https://chat.whatsapp.com/FneGhsY2xwH5rzhqi32hFq";
    const colecaoLink = "https://collshp.com/roz50?share_channel_code=1";
    const avisoLegal = "\n\n⚠️ *Atenção: Promoção sujeita a alteração a qualquer momento!*";
    const callColecao = `\n\n📁 *Acesse nossa coleção completa:* \n${colecaoLink}`;
    const callAmigos = `\n\n--- \n🚀 *Envie nosso grupo para seus amigos:* \n${grupoLink}`;

    let ofertasHoje = parseInt(localStorage.getItem('contagemOfertas') || "0");
    
    window.onload = () => { atualizarInterface(); renderHistorico(); };

    function atualizarInterface() {
        const hora = new Date().getHours();
        if (ofertasHoje >= 20) { ofertasHoje = 0; localStorage.setItem('contagemOfertas', 0); }
        document.getElementById('contagemDia').innerText = `📊 ${ofertasHoje} de 20 Ofertas`;
        const horaTxt = document.getElementById('horaStatus');
        if (hora >= 5 && hora < 12) horaTxt.innerText = "🕒 Turno: Manhã";
        else if (hora >= 12 && hora < 18) horaTxt.innerText = "🕒 Turno: Tarde";
        else horaTxt.innerText = "🕒 Turno: Noite";
    }

    function gerarEEnviar() {
        const link = document.getElementById('link').value.trim();
        const nomeRaw = document.getElementById('nome').value.trim();
        const precoOriginal = document.getElementById('preco').value.trim().replace(',', '.');
        const hora = new Date().getHours();
        
        if (!link || !nomeRaw) return alert("Preencha o link e o nome!");

        let precoTxt = "";
        if (precoOriginal && !isNaN(precoOriginal)) {
            const p = parseFloat(precoOriginal);
            const ancoragem = (p * 1.3).toFixed(2).replace('.', ',');
            const pFormatado = p.toFixed(2).replace('.', ',');
            precoTxt = `\n\n❌ ~~De: R$ ${ancoragem}~~ \n✅ *POR APENAS: R$ ${pFormatado}*`;
        } else {
            precoTxt = "\n\n✅ *PREÇO PROMOCIONAL ATIVO!*";
        }

        const n = `*${nomeRaw.toUpperCase()}*`;

        let modelos = [];
        if (hora >= 5 && hora < 12) {
            modelos = [
                `☀️ *BOM DIA! COMEÇAMOS COM TUDO!* ☀️\n\n📦 ${n}${precoTxt}\n\n✅ Garimpamos essa agora cedo!\n\n🛒 *PEGUE O SEU AQUI:* \n${link}`,
                `💎 *RELIQUIA DA MANHÃ ENCONTRADA!* 💎\n\n🎁 ${n}${precoTxt}\n\n🌟 Qualidade premium com preço baixo.\n\n🛒 *LINK DA OFERTA:* \n${link}`,
                `⚠️ *ALERTA DE OPORTUNIDADE MATINAL!* ⚠️\n\n📦 ${n}${precoTxt}\n\n📢 *ESTOQUE BAIXANDO!* \nCorra!\n\n🛒 *COMPRE AQUI:* \n${link}`,
                `🌈 *ACHADINHO PRA COMEÇAR BEM!* 🌈\n\n🧸 ${n}${precoTxt}\n\n😍 Útil e prático.\n\n🛒 *EU QUERO:* \n${link}`,
                `👑 *O REI DOS ACHADINHOS ACORDOU!* 👑\n\n🏆 ${n}${precoTxt}\n\n🥇 Se você estava esperando um sinal, é ESSE!\n\n🛒 *PEGUE O SEU:* \n${link}`,
                `🦊 *ACHADO ESPERTO DE HOJE!* 🦊\n\n🎯 ${n}${precoTxt}\n\n✅ Economia real. O mais barato!\n\n🛒 *CLIQUE E ECONOMIZE:* \n${link}`
            ];
        } else if (hora >= 12 && hora < 18) {
            modelos = [
                `🔥 *OFERTA QUENTE DA TARDE!* 🔥\n\n🛍️ ${n}${precoTxt}\n\n✅ Menor preço do mês!\n\n🛒 *LINK OFICIAL:* \n${link}`,
                `💥 *BOOM! DESCONTO NA TELA!* 💥\n\n📦 ${n}${precoTxt}\n\n👊 Melhor preço e vendedor nota 10!\n\n🛒 *COMPRE JÁ:* \n${link}`,
                `✨ *ACHADINHO TESTADO E APROVADO!* ✨\n\n📦 ${n}${precoTxt}\n\n🚚 Frete Grátis disponível!\n\n🛒 *PEGUE O SEU AQUI:* \n${link}`,
                `🧨 *OFERTA EXPLOSIVA!* 🧨\n\n💣 ${n}${precoTxt}\n\n💥 Baixou agora! Aproveite!\n\n🛒 *COMPRE AQUI:* \n${link}`,
                `⭐ *TOP 1 VENDAS DA SEMANA!* ⭐\n\n📦 ${n}${precoTxt}\n\n✅ Avaliação nota 10!\n\n🛒 *LINK DO SUCESSO:* \n${link}`,
                `🤫 *OFERTA ESCONDIDA REVELADA!* 🤫\n\n🎁 ${n}${precoTxt}\n\n🕵️‍♂️ Garimpamos esse link.\n\n🛒 *ACESSO AO LINK:* \n${link}`,
                `🚀 *OFERTA PRA DECOLAR!* 🚀\n\n📦 ${n}${precoTxt}\n\n🛸 Rápido, prático e barato.\n\n🛒 *LINK OFICIAL:* \n${link}`
            ];
        } else {
            modelos = [
                `🌙 *ÚLTIMA CHAMADA DA NOITE!* 🌙\n\n📦 ${n}${precoTxt}\n\n⚠️ O preço pode subir na virada do cronômetro.\n\n🛒 *GARANTA O SEU AQUI:* \n${link}`,
                `🛑 *PAROU TUDO! ANTES DE DORMIR:* 🛑\n\n📦 ${n}${precoTxt}\n\n😱 Preço despencou agora!\n\n🛒 *PEGUE RÁPIDO:* \n${link}`,
                `⚡ *OFERTA RELÂMPAGO DA NOITE!* ⚡\n\n🕓 ${n}${precoTxt}\n\n⏳ Vai durar pouquíssimo tempo!\n\n🛒 *LINK RÁPIDO:* \n${link}`,
                `🍀 *SORTE A SUA QUE ACHAMOS!* 🍀\n\n📦 ${n}${precoTxt}\n\n😱 Estava esgotado e voltou!\n\n🛒 *GARANTIR AGORA:* \n${link}`,
                `💸 *DINHEIRO DE VOLTA? QUASE ISSO!* 🔥\n\n💰 ${n}${precoTxt}\n\n🤩 O desconto está gigante!\n\n🛒 *LINK DO ACHADINHO:* \n${link}`,
                `👀 *NÃO DIGA QUE EU NÃO AVISEI!* 👀\n\n📦 ${n}${precoTxt}\n\n⚠️ Só para quem está no grupo!\n\n🛒 *COMPRE AQUI:* \n${link}`,
                `🥳 *PARA TUDO E COMEMORA!* 🥳\n\n🎈 ${n}${precoTxt}\n\n🙌 Finalmente entrou em oferta!\n\n🛒 *CLIQUE NO LINK:* \n${link}`
            ];
        }

        const texto = modelos[Math.floor(Math.random() * modelos.length)] + avisoLegal + callColecao + callAmigos;
        ofertasHoje++;
        localStorage.setItem('contagemOfertas', ofertasHoje);
        atualizarInterface();
        salvar(nomeRaw.toUpperCase(), link, precoOriginal);
        window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(texto), '_blank');
        document.getElementById('link').value = ""; document.getElementById('nome').value = ""; document.getElementById('preco').value = "";
    }

    function salvar(nome, link, preco) {
        let h = JSON.parse(localStorage.getItem('shopeeHistoryAI') || "[]");
        h.unshift({ nome, link, preco, data: new Date().toLocaleTimeString() });
        if (h.length > 20) h.pop();
        localStorage.setItem('shopeeHistoryAI', JSON.stringify(h));
        renderHistorico();
    }

    function renderHistorico() {
        const div = document.getElementById('historyList');
        const h = JSON.parse(localStorage.getItem('shopeeHistoryAI') || "[]");
        div.innerHTML = h.map((item, i) => `
            <div class="history-item">
                <div><b>${item.nome}</b><br><small>${item.data}</small></div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-reuse" onclick="reusar(${i})">🔄</button>
                    <button class="btn-delete" onclick="remover(${i})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function reusar(i) {
        const h = JSON.parse(localStorage.getItem('shopeeHistoryAI'));
        document.getElementById('link').value = h[i].link;
        document.getElementById('nome').value = h[i].nome;
        document.getElementById('preco').value = h[i].preco;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function remover(i) {
        let h = JSON.parse(localStorage.getItem('shopeeHistoryAI'));
        h.splice(i, 1);
        localStorage.setItem('shopeeHistoryAI', JSON.stringify(h));
        renderHistorico();
    }

    function limparTudo() {
        if(confirm("Zerar tudo?")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
